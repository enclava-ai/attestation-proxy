name: Build Attestation Proxy

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      MUSL_TARGET: x86_64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for size gate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ghcr.io/enclava-ai/attestation-proxy:v2
          build-args: |
            MUSL_TARGET=${{ env.MUSL_TARGET }}

      - name: Enforce image size under 15MB
        run: |
          SIZE_BYTES="$(docker image inspect 'ghcr.io/enclava-ai/attestation-proxy:v2' --format '{{.Size}}')"
          echo "attestation-proxy image size: ${SIZE_BYTES} bytes"
          if [ "${SIZE_BYTES}" -ge 15728640 ]; then
            echo "BUILD-03 failure: image size ${SIZE_BYTES} bytes is >= 15728640"
            exit 1
          fi

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/enclava-ai/attestation-proxy:v2
          build-args: |
            MUSL_TARGET=${{ env.MUSL_TARGET }}
